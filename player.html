<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleReplay — Player externo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8eaf0;
    }

    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100vh;
      height: 100dvh;
    }

    #popout-stage {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      width: 100%;
    }

    #popout-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    #popout-status {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 8px;
      font-size: 12px;
      letter-spacing: 0.2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    #popout-status.show {
      opacity: 1;
    }

    #popout-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #9ca3b8;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    #popout-empty strong {
      color: #e8eaf0;
      font-size: 16px;
    }

    #popout-empty.hidden {
      display: none;
    }

    #popout-clip-rail {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      max-width: min(320px, 90vw);
      pointer-events: auto;
    }

    #popout-clip-rail.is-visible {
      display: flex;
    }

    #popout-clip-rail .fullscreen-clip-rail__toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 0;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(8, 10, 16, 0.45);
      backdrop-filter: blur(8px);
      color: rgba(232, 234, 240, 0.88);
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
    }

    #popout-clip-rail .fullscreen-clip-rail__body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: min(320px, 90vw);
      padding: 7px 8px 5px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(8, 10, 16, 0.38);
      backdrop-filter: blur(8px);
    }

    #popout-clip-rail.is-collapsed .fullscreen-clip-rail__body {
      display: none;
    }

    #popout-clip-rail.is-collapsed .fullscreen-clip-rail__toggle-icon {
      transform: rotate(-90deg);
    }

    #popout-clip-rail .fullscreen-clip-rail__row {
      display: block;
      width: 100%;
      padding: 5px 7px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
      color: #e8eaf0;
      text-align: left;
      font: inherit;
      font-size: 0.74rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #popout-clip-rail button.fullscreen-clip-rail__row:not(:disabled) {
      cursor: pointer;
    }

    #popout-clip-rail button.fullscreen-clip-rail__row:disabled {
      opacity: 0.35;
    }

    #popout-clip-rail .fullscreen-clip-rail__row--current {
      font-weight: 600;
      background: rgba(99, 140, 255, 0.22);
      border: 1px solid rgba(120, 160, 255, 0.35);
    }

    #popout-clip-rail .fullscreen-clip-rail__count {
      font-size: 0.64rem;
      text-align: center;
      color: rgba(232, 234, 240, 0.5);
    }
  </style>
</head>

<body>
  <div id="popout-stage">
    <div id="popout-player"></div>
    <div id="popout-clip-rail" class="fullscreen-clip-rail" hidden aria-label="Cola de clips">
      <button type="button" id="popout-clip-rail-toggle" class="fullscreen-clip-rail__toggle" aria-expanded="true">
        <span>Clips</span>
        <span class="fullscreen-clip-rail__toggle-icon" aria-hidden="true">▾</span>
      </button>
      <div class="fullscreen-clip-rail__body">
        <button type="button" class="fullscreen-clip-rail__row" data-rail-dir="prev" disabled>Anterior — —</button>
        <div class="fullscreen-clip-rail__row fullscreen-clip-rail__row--current">Actual — —</div>
        <button type="button" class="fullscreen-clip-rail__row" data-rail-dir="next" disabled>Siguiente — —</button>
        <span class="fullscreen-clip-rail__count"></span>
      </div>
    </div>
  </div>
  <div id="popout-empty">
    <strong>Player externo de SimpleReplay</strong>
    <span>Esperando video desde la app principal…</span>
  </div>
  <div id="popout-status">Listo</div>

  <script type="module" src="js/popoutPlayer.js"></script>
</body>

</html>
